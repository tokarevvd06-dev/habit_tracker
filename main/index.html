<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер привычек</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-xl shadow p-5 text-center">
                <div class="text-2xl font-bold text-blue-600">7</div>
                <div class="text-gray-500 text-sm mt-1">Дней подряд</div>
            </div>
            <div class="bg-white rounded-xl shadow p-5 text-center">
                <div class="text-2xl font-bold text-purple-600" id="countHab">5</div>
                <div class="text-gray-500 text-sm mt-1">Привычек всего</div>
            </div>
            <div class="bg-white rounded-xl shadow p-5 text-center">
                <div class="text-2xl font-bold text-green-600" id="todayCount">3</div>
                <div class="text-gray-500 text-sm mt-1">Выполнено сегодня</div>
            </div>
            <div class="bg-white rounded-xl shadow p-5 text-center">
                <div class="text-2xl font-bold text-yellow-600">85%</div>
                <div class="text-gray-500 text-sm mt-1">Успешность</div>
            </div>
        </div>

        <div class="text-center py-16" id="begin">
        </div>

        <div class="mb-8 text-center">
            <button id="newHab" class="bg-blue-500 hover:bg-blue-600 text-white font-medium py-3 px-8 rounded-xl transition flex items-center mx-auto">
                Новая привычка
            </button>
        </div>

        <div class="space-y-6">

        </div>

        <footer class="mt-12 pt-8 border-t border-gray-200 text-center text-gray-500 text-sm">
            <p class="mt-2">Сегодня: <span class="font-medium">28 января 2026</span></p>
        </footer>
    </div>
    <script src="./src/main.js"></script>
</body>
</html>
